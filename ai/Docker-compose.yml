services:
  postgres-db:
    image: pgvector/pgvector:pg17
    container_name: fintech_postgres
    environment:
      POSTGRES_DB: compliance_audit_db
      POSTGRES_USER: dev_admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintech_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres-db
    networks:
      - fintech-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  fintech-network:
    driver: bridge
